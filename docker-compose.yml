services:
  xmpp:
    image: prosody/prosody:latest
    container_name: xmpp-start-server
    ports:
      - "5222:5222"    # XMPP client connections
      - "5347:5347"    # component port (MUC)
    volumes:
      - ./docker/prosody/prosody.cfg.lua:/etc/prosody/conf.avail/localhost.cfg.lua
      - prosody-data:/var/lib/prosody
    environment:
      - LOCAL=localhost
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "prosodyctl", "status"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  prosody-data:
