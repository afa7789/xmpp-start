    - id: OMEMO
      name: "OMEMO end-to-end encryption"
      xep: "XEP-0384"
      description: |
        A lock button in the composer enables E2E encryption. When enabled, messages are 
        encrypted before sending and decrypted on receive. Shield icon per message.
      files:
        - "src/ui/conversation.rs"
        - "src/xmpp/engine.rs"
        - "src/xmpp/mod.rs"
      depends_on:
