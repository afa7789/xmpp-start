  - id: L2
    name: "@mention autocomplete in MUC"
    completed: "2026-03-23"
    notes: |
      Typing @ in the MUC composer shows an autocomplete dropdown of available
      occupants filtered by prefix. Selecting a nick inserts @nick into the
      composer. Messages containing @own_nick are highlighted with an amber tint.
      State: mention_prefix in ConversationView; muc_own_nicks in ChatScreen.
  - id: M6
    name: "Reaction hover bar"
    completed: "2026-03-22"
  - id: K1
    name: "Room creation UI + config modal"
    completed: "2026-03-23"
    commit: "a2d6fa3"
    notes: |
      Full room creation flow: sidebar "*" button opens create-room form,
      engine detects XEP-0045 status 201 and requests config form,
      ChatScreen shows config modal (name, public, persistent) before
      room goes live.
  - id: K3
    name: "Room invitations"
    completed: "2026-03-23"
    notes: |
      XEP-0249 direct + XEP-0045 mediated receive detection in handle_message.
      Invite button in OccupantPanel header opens send-invite dialog (invitee JID, reason).
      Incoming invitations shown as banners with Accept/Decline.
      Accept joins the room via JoinRoom command.
  - id: M4
    name: "Audio recording (voice messages)"
    completed: "2026-03-23"
    notes: |
      Mic button (🎤) in the composer triggers cpal audio capture via a dedicated thread.
      PCM i16 samples streamed over mpsc to the UI. Stop encodes to WAV (hound) in
      spawn_blocking, then reuses the existing XEP-0363 HTTP Upload flow to send.
      Recording strip shows elapsed M:SS timer (VoiceTick subscription, 1s interval).
      Cancel drops the buffer and returns to Idle. Auto-stop at 5 minutes.
      Deps added: cpal 0.15, hound 3. audio/wav MIME added to upload MIME map.

